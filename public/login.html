<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>SamiMart</title>
    <link rel="icon" type="image/png" href="assets/logo/favicon.png" />
    <link rel="icon" type="image/png" href="assets/logo/favicon.png" />

    <script
      type="text/javascript"
      src="/assets/bootstrap/bootstrap.bundle.min.js"
    ></script>

    <link rel="stylesheet" href="assets/bootstrap/bootstrap.min.css" />

    <link rel="stylesheet" href="assets/bootstrap/bootstrap-icons.min.css" />

    <style>
      body {
        background: linear-gradient(135deg, #0d9488, #0f172a);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Arial, sans-serif;
      }

      .login-box {
        background: #fff;
        padding: 40px;
        border-radius: 12px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }

      .logo {
        text-align: center;
        font-size: 26px;
        font-weight: bold;
        color: #0d9488;
        margin-bottom: 25px;
      }

      .btn-login {
        background: #0d9488;
        border: none;
        font-weight: bold;
      }

      .btn-login:hover {
        background: #0f766e;
      }

      .message {
        margin-top: 15px;
        text-align: center;
        font-size: 14px;
      }

      .spinner-border {
        width: 18px;
        height: 18px;
        margin-right: 8px;
        display: none;
      }
      .logo-img {
        width: 130px;
        height: auto;
        margin-bottom: 12px;
        filter: drop-shadow(0px 4px 6px rgba(0, 0, 0, 0.2));
      }
    </style>
  </head>
  <body>
    <div class="login-box">
      <div class="text-center mb-3">
        <img
          src="/assets/logo/samimart.png"
          alt="SamiMart Logo"
          class="logo-img"
        />
      </div>

      <div class="logo">SamiMart Admin</div>

      <!-- <form id="loginForm" action="/login-step1" method="POST"> -->
      <!-- <form id="loginForm"> -->
      <div class="mb-3">
        <label class="form-label">Email ID</label>
        <input
          type="email"
          id="email"
          placeholder="Enter Email"
          class="form-control"
          value="samimartindia@gmail.com"
          required
        />

        <!-- <input type="text" id="username" class="form-control" required /> -->
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <div class="input-group">
          <input
            type="password"
            id="password"
            value="Sami@123"
            placeholder="Enter Password"
            class="form-control"
            placeholder="Enter password"
            required
          />
          <input
            type="button"
            class="btn btn-outline-secondary"
            type="button"
            id="togglePassword"
            value="👁"
          />
        </div>
      </div>

      <button id="loginBtn" class="btn btn-login w-100 py-2">
        <span id="spinner" class="spinner-border spinner-border-sm"></span>
        Login
      </button>
      <!-- & Send OTP Link -->
      <div id="message" class="message"></div>
      <div class="text-end mt-2">
        <a href="#" id="forgotPasswordBtn" class="forgot-link">
          Forgot Password?
        </a>
      </div>
      <!-- </form> -->
    </div>

    <script type="module" src="js/login.js?v=4"></script>

    <script>
      const togglePassword = document.getElementById("togglePassword");
      const passwordInput = document.getElementById("password");

      togglePassword.addEventListener("click", function () {
        const type =
          passwordInput.getAttribute("type") === "password"
            ? "text"
            : "password";

        passwordInput.setAttribute("type", type);

        // change icon
        this.textContent = type === "password" ? "👁" : "🙈";
      });
    </script>
  </body>
</html>
